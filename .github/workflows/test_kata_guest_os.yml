name: Test Kata Guest OS

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CRICTL_VERSION: v1.29.0
  KATA_VERSION: 3.28.0
  NERDCTL_VERSION: v2.2.2
  PAUSE_IMAGE: registry.k8s.io/pause:3.10

jobs:
  prepare-kata-runtime-host:
    runs-on: ubuntu-latest
    container:
      image: asterinas/asterinas:0.17.1-20260319
      options: --privileged --cgroupns host
    defaults:
      run:
        shell: bash
    timeout-minutes: 90
    steps:
      - name: Check disk space
        run: |
          set -euxo pipefail
          df -h

      - uses: actions/checkout@v4

      - name: Install Kata environment
        run: |
          set -euxo pipefail
          bash tools/kata/install_kata_env.sh

      - name: Run Kata pass 1
        run: |
          set -euxo pipefail
          bash tools/kata/run_kata_pass.sh

      - name: Run Kata pass 2
        run: |
          set -euxo pipefail
          bash tools/kata/run_kata_pass.sh
